<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Templates - DocSign</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Inter',sans-serif;background:#F5F5F5;color:#1A2A4A}

    .sidebar{width:260px;background:#1A2A4A;position:fixed;height:100vh;overflow-y:auto}
    .logo{padding:28px 24px;border-bottom:1px solid rgba(255,255,255,0.08)}
    .logo h2{color:#fff;font-size:24px;font-weight:600}
    .logo span{color:#FFBF00}
    .nav-menu{padding:20px 16px}
    .nav-item{display:block;padding:10px 16px;color:rgba(255,255,255,0.7);text-decoration:none;border-radius:8px;margin-bottom:4px;font-size:14px;font-weight:500;transition:all .2s}
    .nav-item:hover{background:rgba(255,191,0,0.1);color:#FFBF00}
    .nav-item.active{background:#FFBF00;color:#1A2A4A}

    .main-content{margin-left:260px;padding:32px 40px}

    .page-header{margin-bottom:28px}
    .page-header h1{font-size:28px;font-weight:600;color:#1A2A4A}
    .page-header p{color:#8A8A8A;font-size:14px;margin-top:4px}

    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:16px}

    .card{background:#fff;border:1px solid #E8E8E8;border-radius:12px;overflow:hidden}
    .card-header{padding:16px 20px;background:#FAFAFA;border-bottom:1px solid #E8E8E8}
    .card-header h2{font-size:16px;font-weight:600;color:#1A2A4A}
    .card-header .desc{margin-top:6px;font-size:12px;color:#8A8A8A;line-height:1.3}

    .card-body{padding:16px 20px}

    .pill{display:inline-block;padding:6px 10px;border-radius:999px;background:#FFF3E0;border:1px solid #FFBF00;color:#CC7B00;font-size:12px;margin:4px 6px 0 0}

    .empty{padding:40px;text-align:center;color:#8A8A8A}

    @media (max-width:768px){
      .sidebar{width:70px}
      .logo h2{font-size:18px;text-align:center}
      .logo span,.nav-item span:last-child{display:none}
      .nav-item{text-align:center;padding:12px 0}
      .main-content{margin-left:70px;padding:20px}
    }
  </style>
</head>
<body>
  <div class="sidebar">
    <div class="logo">
      <h2>Doc<span>Sign</span></h2>
    </div>
    <div class="nav-menu">
      <a href="index.html" class="nav-item">Dashboard</a>
      <a href="create-category.html" class="nav-item">Categories</a>
      <a href="upload-document.html" class="nav-item">Upload</a>
      <a href="templates.html" class="nav-item active">Templates</a>
      <a href="documents.html" class="nav-item">Documents</a>
    </div>
  </div>

  <div class="main-content">
    <div class="page-header">
      <h1>Templates</h1>
      <p>Templates are generated from category fields schema.</p>
    </div>

    <div id="container" class="grid"></div>
    <div id="empty" class="empty" style="display:none;">
      No templates available. Create categories first.
    </div>
  </div>

  <script>
    const container = document.getElementById('container');
    const emptyEl = document.getElementById('empty');

    function escapeHtml(str) {
      if (str === null || str === undefined) return '';
      return String(str).replace(/[&<>]/g, m => ({'&':'&amp;','<':'<','>':'>'}[m]));
    }

    async function loadTemplates() {
      container.innerHTML = '';
      emptyEl.style.display = 'none';

      try {
        const res = await fetch('api/template.php', { cache: 'no-store' });
        const result = await res.json();

        if (!result.success) throw new Error(result.error || result.message || 'Failed to load');
        const data = Array.isArray(result.data) ? result.data : [];

        if (data.length === 0) {
          emptyEl.style.display = 'block';
          return;
        }

        container.innerHTML = data.map(item => {
          const cat = item.category || {};
          const fields = Array.isArray(item.template) ? item.template : [];

          const pills = fields.length
            ? fields.map(f => `<span class="pill">${escapeHtml(f)}</span>`).join('')
            : `<span style="color:#8A8A8A;font-size:13px">No fields schema defined for this category.</span>`;

          const docName = item.template_document?.filename || cat.name || 'Untitled';
          const docUrl = item.template_document?.url || '';

          // Show ONLY: document name and a view option (no schema pills / no extra rows)
          if (!docUrl) return '';

          return `
            <div class="card">
              <div class="card-header">
                <h2>${escapeHtml(docName)}</h2>
                <div class="desc" style="margin-top:6px;font-size:12px;color:#8A8A8A;line-height:1.3;">
                  Category: ${escapeHtml(cat.name || 'Uncategorized')}
                </div>
              </div>
              <div class="card-body">
                <a href="${escapeHtml(docUrl)}" target="_blank" rel="noopener" style="display:inline-block;padding:8px 10px;border:1px solid #FFBF00;border-radius:10px;color:#1A2A4A;text-decoration:none;background:#FFF3E0;font-size:13px;font-weight:600;">
                  View
                </a>
              </div>
            </div>
          `;
        }).join('');
      } catch (e) {
        console.error(e);
        emptyEl.textContent = 'Error loading templates.';
        emptyEl.style.display = 'block';
      }
    }

    loadTemplates();
  </script>
</body>
</html>
