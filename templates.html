<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Templates - DocSign</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Inter',sans-serif;background:#F5F5F5;color:#1A2A4A;overflow-x:hidden}

    .sidebar{width:260px;background:#1A2A4A;position:fixed;top:0;left:0;height:100vh;overflow-y:auto;z-index:100;transition:transform .25s}
    .logo{padding:24px 20px;border-bottom:1px solid rgba(255,255,255,0.08)}
    .logo h2{color:#fff;font-size:22px;font-weight:600}
    .logo span{color:#FFBF00}
    .nav-menu{padding:16px 12px}
    .nav-item{display:flex;align-items:center;gap:10px;padding:10px 14px;color:rgba(255,255,255,0.7);text-decoration:none;border-radius:8px;margin-bottom:4px;font-size:14px;font-weight:500;transition:all .2s}
    .nav-item:hover{background:rgba(255,191,0,0.1);color:#FFBF00}
    .nav-item.active{background:#FFBF00;color:#1A2A4A}
    .nav-icon{width:20px;text-align:center;flex-shrink:0}
    .main-content{margin-left:260px;padding:28px 32px;min-height:100vh;transition:margin .25s}

    .menu-toggle{display:none;position:fixed;top:12px;left:12px;z-index:200;width:36px;height:36px;border:none;border-radius:8px;background:#1A2A4A;color:#fff;font-size:20px;cursor:pointer;align-items:center;justify-content:center}
    .sidebar-backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:99}

    .page-header{margin-bottom:24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
    .page-header h1{font-size:26px;font-weight:600;color:#1A2A4A;line-height:1.2}
    .page-header p{color:#8A8A8A;font-size:14px;margin-top:2px}

    .cat-list{display:flex;flex-direction:column;gap:10px}

    .cat-card{background:#fff;border:1px solid #E8E8E8;border-radius:12px;overflow:hidden}
    .cat-head{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;cursor:pointer;user-select:none;transition:background .12s;gap:10px;flex-wrap:wrap}
    .cat-head:hover{background:#FAFAFA}
    .cat-head-left{display:flex;align-items:center;gap:10px;min-width:0;flex:1 1 auto;overflow:hidden}
    .cat-head-left h2{font-size:14px;font-weight:600;color:#1A2A4A;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex-shrink:1}
    .cat-head-left .desc{font-size:12px;color:#8A8A8A;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:180px;flex-shrink:1}
    .cat-head-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
    .badge{display:inline-block;padding:2px 8px;border-radius:999px;font-size:10px;font-weight:600;white-space:nowrap}
    .badge-yes{background:#E8F5E9;color:#2E7D32}
    .badge-no{background:#FFF3E0;color:#CC7B00}
    .badge-doc{background:#E3F2FD;color:#1565C0}
    .cat-arrow{font-size:12px;color:#BBB;transition:transform .2s;flex-shrink:0}
    .cat-arrow.open{transform:rotate(180deg)}

    .cat-body{padding:0 16px 16px;display:none}
    .cat-body.open{display:block}
    .cat-body-inner{border-top:1px solid #E8E8E8;padding-top:14px}

    .upload-area{border:2px dashed #DDD;border-radius:8px;padding:16px;text-align:center;cursor:pointer;transition:all .2s}
    .upload-area:hover{border-color:#FFBF00;background:#FFFBEA}
    .upload-area.has-file{border-color:#FFBF00;background:#FFFBEA}
    .upload-area input{display:none}
    .upload-area .icon{font-size:24px;color:#CCC;margin-bottom:4px}
    .upload-area .label{font-size:13px;color:#999}
    .upload-area .hint{font-size:11px;color:#BBB;margin-top:4px}

    .tpl-info{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;padding:12px 14px;background:#FAFAFA;border:1px solid #E8E8E8;border-radius:8px}
    .tpl-info .name{font-size:13px;font-weight:500;color:#1A2A4A;word-break:break-word;min-width:0}
    .tpl-info .name span{color:#8A8A8A;font-weight:400}
    .tpl-info .tpl-actions{display:flex;gap:6px;flex-wrap:wrap}
    .btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:8px 14px;border:none;border-radius:8px;font-size:13px;font-weight:600;text-decoration:none;cursor:pointer;transition:all .15s;font-family:inherit;text-align:center}
    .btn-preview{background:#1A2A4A;color:#fff}
    .btn-preview:hover{background:#0F1A2E}
    .btn-download{background:#FFBF00;color:#1A2A4A}
    .btn-download:hover{background:#E5AC00}
    .btn-upload{background:#FFBF00;color:#1A2A4A}
    .btn-upload:hover{background:#E5AC00}
    .btn-upload:disabled{background:#CCC;cursor:not-allowed}

    .status-msg{font-size:12px;padding:8px 12px;border-radius:6px;margin-top:8px;word-break:break-word}
    .status-msg.success{background:#E8F5E9;color:#2E7D32}
    .status-msg.error{background:#FFEBEE;color:#C62828}
    .status-msg.uploading{background:#FFF8E1;color:#F57F17}

    .empty-state{padding:48px 20px;text-align:center;color:#8A8A8A}
    .empty-state .icon{font-size:40px;margin-bottom:10px}

    @media (max-width:1024px){
      .main-content{padding:24px}
      .cat-head-left .desc{max-width:140px}
    }
    @media (max-width:900px){
      .cat-head-left .desc{display:none}
      .sidebar{width:220px}
      .main-content{margin-left:220px;padding:24px 20px}
    }
    @media (max-width:768px){
      .sidebar{width:260px;transform:translateX(-100%)}
      .sidebar.open{transform:translateX(0)}
      .sidebar-backdrop.open{display:block}
      .menu-toggle{display:flex}
      .main-content{margin-left:0;padding:60px 16px 24px}
      .page-header h1{font-size:22px}
      .cat-head{padding:12px 14px}
      .cat-head-left .desc{display:block;max-width:100%}
      .cat-body{padding:0 14px 14px}
    }
    @media (max-width:480px){
      .main-content{padding:56px 10px 16px}
      .page-header h1{font-size:20px}
      .cat-head{padding:10px 12px;gap:6px}
      .cat-head-left{flex-wrap:wrap;gap:4px;width:100%}
      .cat-head-left h2{font-size:13px}
      .badge{font-size:9px;padding:2px 6px}
      .cat-head-right{gap:4px}
      .tpl-info{padding:10px 12px;flex-direction:column;align-items:stretch}
      .tpl-info .tpl-actions{justify-content:stretch}
      .tpl-info .tpl-actions .btn{flex:1;min-width:0}
      .upload-area{padding:12px}
      .upload-area .label{font-size:12px}
      .upload-area .hint{font-size:10px}
    }
  </style>
</head>
<body>
  <div class="sidebar-backdrop" id="sidebarBackdrop"></div>
  <button class="menu-toggle" id="menuToggle" aria-label="Toggle menu">☰</button>
  <div class="sidebar" id="sidebar">
    <div class="logo">
      <h2>Doc<span>Sign</span></h2>
    </div>
    <div class="nav-menu">
      <a href="index.html" class="nav-item"><span class="nav-icon">●</span> <span>Dashboard</span></a>
      <a href="create-category.html" class="nav-item"><span class="nav-icon">●</span> <span>Categories</span></a>
      <a href="templates.html" class="nav-item active"><span class="nav-icon">●</span> <span>Templates</span></a>
      <a href="fill-gaps.html" class="nav-item"><span class="nav-icon">●</span> <span>Fill &amp; Sign</span></a>
      <a href="documents.html" class="nav-item"><span class="nav-icon">●</span> <span>Documents</span></a>
    </div>
  </div>

  <div class="main-content">
    <div class="page-header">
      <div>
        <h1>Templates</h1>
        <p>Upload .docx template documents per category.</p>
      </div>
    </div>

    <div id="cat-list" class="cat-list"></div>
    <div id="empty" class="empty-state" style="display:none;">
      <div class="icon">&#128196;</div>
      <p>No categories found.</p>
      <a href="create-category.html" style="color:#FFBF00;font-weight:600;font-size:14px;">Create one first</a>
    </div>
  </div>

  <script>
    const listEl = document.getElementById('cat-list');
    const emptyEl = document.getElementById('empty');

    function escapeHtml(str) {
      if (str === null || str === undefined) return '';
      return String(str).replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]));
    }

    function toggle(id) {
      const body = document.getElementById('body-' + id);
      const arrow = document.getElementById('arrow-' + id);
      body.classList.toggle('open');
      arrow.classList.toggle('open');
    }

    async function loadData() {
      listEl.innerHTML = '<div style="text-align:center;padding:40px;color:#8A8A8A;">Loading...</div>';
      emptyEl.style.display = 'none';

      try {
        const res = await fetch('api/template.php', { cache: 'no-store' });
        const result = await res.json();
        if (!result.success) throw new Error(result.error || result.message || 'Failed to load');
        const data = Array.isArray(result.data) ? result.data : [];

        if (data.length === 0) {
          emptyEl.style.display = 'block';
          return;
        }

        listEl.innerHTML = data.map(item => {
          const cat = item.category || {};
          const hasTemplate = item.template_document !== null;
          const tpl = item.template_document || {};
          const docCount = Array.isArray(item.documents) ? item.documents.length : 0;

          const tplSection = hasTemplate ? `
            <div class="tpl-info">
              <div class="name">${escapeHtml(tpl.filename)} <span>&middot; .docx</span></div>
              <div class="tpl-actions">
                <a href="api/open-template-in-word.php?document_id=${tpl.id}" target="_blank" class="btn btn-preview">Preview in Word</a>
                <a href="${escapeHtml(tpl.download_url || '')}" class="btn btn-download">Download</a>
              </div>
            </div>
          ` : `
            <div>
              <div class="upload-area" id="drop-${cat.id}" onclick="document.getElementById('file-${cat.id}').click()">
                <div class="icon">+</div>
                <div class="label">Click to select a .docx template</div>
                <div class="hint">Only .docx files are accepted</div>
                <input type="file" id="file-${cat.id}" accept=".docx" onchange="onFile(${cat.id})" />
              </div>
              <div style="display:flex;gap:8px;margin-top:10px;">
                <button class="btn btn-upload" id="upload-btn-${cat.id}" onclick="uploadTpl(${cat.id})" disabled>Upload Template</button>
              </div>
              <div id="upload-status-${cat.id}"></div>
            </div>
          `;

          return `
            <div class="cat-card">
              <div class="cat-head" onclick="toggle(${cat.id})">
                <div class="cat-head-left">
                  <h2>${escapeHtml(cat.name || 'Uncategorized')}</h2>
                  ${cat.description ? `<span class="desc">${escapeHtml(cat.description)}</span>` : ''}
                </div>
                <div style="display:flex;align-items:center;gap:10px;" class="cat-head-right">
                  <span class="badge ${hasTemplate ? 'badge-yes' : 'badge-no'}">${hasTemplate ? 'Template' : 'No Template'}</span>
                  <span class="badge badge-doc">${docCount} doc${docCount !== 1 ? 's' : ''}</span>
                  <span class="cat-arrow" id="arrow-${cat.id}">&#9660;</span>
                </div>
              </div>
              <div class="cat-body" id="body-${cat.id}">
                <div class="cat-body-inner">
                  ${tplSection}
                </div>
              </div>
            </div>
          `;
        }).join('');
      } catch (e) {
        console.error(e);
        emptyEl.style.display = 'block';
        emptyEl.innerHTML = '<p>Error loading templates.</p>';
      }
    }

    function onFile(id) {
      const input = document.getElementById('file-' + id);
      const area = document.getElementById('drop-' + id);
      const btn = document.getElementById('upload-btn-' + id);
      if (input.files.length) {
        const f = input.files[0];
        area.classList.add('has-file');
        area.innerHTML = '<div style="font-size:22px;color:#FFBF00;margin-bottom:4px;">&#10003;</div><div style="font-size:13px;font-weight:500;color:#1A2A4A;">' + escapeHtml(f.name) + '</div><div style="font-size:11px;color:#999;margin-top:2px;">' + (f.size / 1024).toFixed(1) + ' KB</div>';
        btn.disabled = false;
      }
    }

    async function uploadTpl(id) {
      const input = document.getElementById('file-' + id);
      const status = document.getElementById('upload-status-' + id);
      const btn = document.getElementById('upload-btn-' + id);

      if (!input.files.length) {
        status.className = 'status-msg error';
        status.textContent = 'Select a file first.';
        return;
      }

      const fd = new FormData();
      fd.append('category_id', id);
      fd.append('document', input.files[0]);

      btn.disabled = true;
      btn.textContent = 'Uploading...';
      status.className = 'status-msg uploading';
      status.textContent = 'Uploading template...';

      try {
        const res = await fetch('api/upload-template.php', { method: 'POST', body: fd });
        const result = await res.json();
        if (result.success) {
          status.className = 'status-msg success';
          status.textContent = 'Template uploaded!';
          setTimeout(loadData, 1000);
        } else {
          btn.disabled = false;
          btn.textContent = 'Upload Template';
          status.className = 'status-msg error';
          status.textContent = result.message || 'Upload failed.';
        }
      } catch (e) {
        btn.disabled = false;
        btn.textContent = 'Upload Template';
        status.className = 'status-msg error';
        status.textContent = 'Error: ' + e.message;
      }
    }

    loadData();

    // Sidebar toggle
    document.getElementById('menuToggle')?.addEventListener('click', function() {
      document.getElementById('sidebar').classList.toggle('open');
      document.getElementById('sidebarBackdrop').classList.toggle('open');
    });
    document.getElementById('sidebarBackdrop')?.addEventListener('click', function() {
      document.getElementById('sidebar').classList.remove('open');
      this.classList.remove('open');
    });
  </script>
</body>
</html>
